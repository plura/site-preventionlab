<!DOCTYPE html>
<html lang="pt" xmlns:v="urn:schemas-microsoft-com:vml" xmlns:o="urn:schemas-microsoft-com:office:office">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<meta name="x-apple-disable-message-reformatting">
	<meta name="color-scheme" content="light">
	<meta name="supported-color-schemes" content="light">
	<title>%FORM_NAME%</title>
	<!--[if mso]>
	<noscript>
		<xml>
			<o:OfficeDocumentSettings>
				<o:PixelsPerInch>96</o:PixelsPerInch>
			</o:OfficeDocumentSettings>
		</xml>
	</noscript>
	<![endif]-->
	<style type="text/css">
		*, *::before, *::after { box-sizing: border-box; }
		body, table, td, a { -webkit-text-size-adjust: 100%; -ms-text-size-adjust: 100%; }
		table, td { mso-table-lspace: 0pt; mso-table-rspace: 0pt; }
		img { -ms-interpolation-mode: bicubic; border: 0; display: block; height: auto; outline: none; text-decoration: none; }

		body {
			margin: 0;
			padding: 0;
			background-color: #ede0cf;
			font-family: Helvetica Neue, Helvetica, Arial, sans-serif;
			color: #111111;
			width: 100% !important;
		}

		.preheader {
			display: none;
			font-size: 1px;
			line-height: 1px;
			max-height: 0;
			max-width: 0;
			opacity: 0;
			overflow: hidden;
			mso-hide: all;
		}

		.wrapper {
			background-color: #ede0cf;
			padding: 48px 16px;
			width: 100%;
		}

		.email-container {
			margin: 0 auto;
			max-width: 560px;
			width: 100%;
		}

		/* —— Header —— */
		.email-header {
			padding: 0 0 28px;
			text-align: center;
		}

		.email-header-name {
			color: #111111;
			font-family: 'Palatino Linotype', Palatino, 'Book Antiqua', Georgia, serif;
			font-size: 18px;
			font-weight: normal;
			letter-spacing: 0.25em;
			margin: 0 0 2px;
			text-transform: uppercase;
		}

		.email-header-sub {
			color: #8a7d72;
			font-family: Helvetica Neue, Helvetica, Arial, sans-serif;
			font-size: 9px;
			letter-spacing: 0.2em;
			margin: 0;
			text-transform: uppercase;
		}

		/* —— Accent line —— */
		.email-accent {
			background-color: #d4f000;
			height: 3px;
			font-size: 0;
			line-height: 0;
		}

		/* —— Body card —— */
		.email-body {
			background-color: #ffffff;
			padding: 36px 48px 48px;
		}

		.email-intro {
			color: #111111;
			font-family: 'Palatino Linotype', Palatino, 'Book Antiqua', Georgia, serif;
			font-size: 13px;
			line-height: 1.8;
			margin: 0 0 32px;
		}

		.email-form-name {
			color: #8a7d72;
			font-family: Helvetica Neue, Helvetica, Arial, sans-serif;
			font-size: 9px;
			letter-spacing: 0.2em;
			margin: 0 0 24px;
			text-transform: uppercase;
		}

		/* —— Fields table —— */
		.form-data {
			border-collapse: collapse;
			width: 100%;
		}

		.form-data tr:last-child td {
			border-bottom: none;
		}

		.form-data td {
			border-bottom: 1px solid #ede0cf;
			padding: 12px 0;
			vertical-align: top;
		}

		.label-cell {
			color: #8a7d72;
			font-family: Helvetica Neue, Helvetica, Arial, sans-serif;
			font-size: 9px;
			letter-spacing: 0.12em;
			padding-right: 20px;
			padding-top: 15px;
			text-transform: uppercase;
			white-space: nowrap;
			width: 30%;
		}

		.value-cell {
			color: #111111;
			font-family: 'Palatino Linotype', Palatino, 'Book Antiqua', Georgia, serif;
			font-size: 14px;
			line-height: 1.7;
		}

		/* —— Footer —— */
		.email-footer {
			border-top: 1px solid #d5c8bb;
			padding: 28px 48px 8px;
			text-align: center;
		}

		.email-footer p {
			color: #8a7d72;
			font-family: Helvetica Neue, Helvetica, Arial, sans-serif;
			font-size: 11px;
			letter-spacing: 0.05em;
			line-height: 1.9;
			margin: 0 0 6px;
		}

		.email-footer a {
			color: #8a7d72;
			text-decoration: none;
		}

		.footer-name {
			color: #111111 !important;
			font-size: 11px !important;
			font-weight: bold;
			letter-spacing: 0.2em !important;
			text-transform: uppercase;
		}

		/* —— Credit —— */
		.email-credit {
			padding: 0 48px 32px;
			text-align: center;
		}

		.email-credit p {
			color: #b8aa9e;
			font-family: Helvetica Neue, Helvetica, Arial, sans-serif;
			font-size: 10px;
			letter-spacing: 0.05em;
			margin: 0;
		}

		.email-credit a {
			color: #b8aa9e;
			text-decoration: none;
		}

		/* —— Mobile —— */
		@media screen and (max-width: 480px) {
			.wrapper      { padding: 24px 12px !important; }
			.email-body   { padding: 28px 24px 24px !important; }
			.email-footer { padding-left: 24px !important; padding-right: 24px !important; }
			.email-credit { padding-left: 24px !important; padding-right: 24px !important; }

			.label-cell {
				border-bottom: none !important;
				display: block !important;
				padding-bottom: 2px !important;
				padding-top: 14px !important;
				white-space: normal !important;
				width: 100% !important;
			}
			.value-cell {
				display: block !important;
				padding-top: 0 !important;
				width: 100% !important;
			}
		}
	</style>
</head>
<body>

<div class="preheader">%FORM_NAME% &mdash; Prevention Lab&#847;&zwnj;&nbsp;&#847;&zwnj;&nbsp;&#847;&zwnj;&nbsp;&#847;&zwnj;&nbsp;&#847;&zwnj;&nbsp;&#847;&zwnj;&nbsp;&#847;&zwnj;&nbsp;&#847;&zwnj;&nbsp;</div>

<table role="presentation" width="100%" cellspacing="0" cellpadding="0" border="0">
	<tr>
		<td class="wrapper" align="center" bgcolor="#ede0cf">

			<!--[if (gte mso 9)|(IE)]>
			<table align="center" border="0" cellpadding="0" cellspacing="0" width="560">
			<tr><td>
			<![endif]-->

			<table role="presentation" class="email-container" cellspacing="0" cellpadding="0" border="0" align="center" width="100%">

				<!-- Header -->
				<tr>
					<td class="email-header" bgcolor="#ede0cf">
						<p class="email-header-name">Prevention Lab</p>
						<p class="email-header-sub">Dra. Cristina Ferreira Leite</p>
					</td>
				</tr>

				<!-- Accent -->
				<tr>
					<td class="email-accent" bgcolor="#d4f000">&nbsp;</td>
				</tr>

				<!-- Body -->
				<tr>
					<td class="email-body" bgcolor="#ffffff">
						%INTRO%
						<p class="email-form-name">%FORM_NAME%</p>
						<table class="form-data" role="presentation" cellspacing="0" cellpadding="0" border="0">
							%FIELDS%
						</table>
					</td>
				</tr>

				<!-- Footer -->
				<tr>
					<td class="email-footer" bgcolor="#ede0cf">
						<p class="footer-name">Prevention Lab</p>
						<p>
							<a href="mailto:info@preventionlab.pt">info@preventionlab.pt</a><br>
							<a href="tel:+351912198818">+351 912 198 818</a>
						</p>
						<p>
							<a href="https://www.instagram.com/dracristinaleite_prevlab/" target="_blank">Instagram</a>
							&nbsp;&middot;&nbsp;
							<a href="https://www.facebook.com/Prevention.Lab.Porto/" target="_blank">Facebook</a>
							&nbsp;&middot;&nbsp;
							<a href="https://www.linkedin.com/company/prevention-lab-porto/" target="_blank">LinkedIn</a>
						</p>
					</td>
				</tr>

				<!-- Credit -->
				<tr>
					<td class="email-credit" bgcolor="#ede0cf">
						<p>&copy; %YEAR% Prevention Lab &mdash; powered by <a href="https://plura.pt" target="_blank">Plura&trade;</a></p>
					</td>
				</tr>

			</table>

			<!--[if (gte mso 9)|(IE)]>
			</td></tr>
			</table>
			<![endif]-->

		</td>
	</tr>
</table>
</body>
</html>
