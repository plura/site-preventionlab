<head>
    <meta charset="UTF-8">

    <meta name="robots" content="index, follow">
    <link rel="canonical" href="https://www.preventionlab.pt/">

    <!-- Open Graph -->
    <meta property="og:type"        content="website">
    <meta property="og:url"         content="https://www.preventionlab.pt/">

    <meta property="og:description" content="Medicina preventiva, gestão de stress, qualidade do sono e longevidade, no Porto. Dra. Cristina Ferreira Leite.">
    <meta property="og:locale"      content="pt_PT">
    <meta property="og:image"       content="https://www.preventionlab.pt/assets/img/og-image.jpg">

    <!-- Twitter / X -->
    <meta name="twitter:card"        content="summary_large_image">
    <meta name="twitter:title"       content="PreventionLab — Em Breve">
    <meta name="twitter:description" content="Medicina preventiva, gestão de stress, qualidade do sono e longevidade, no Porto. Dra. Cristina Ferreira Leite.">
    <meta name="twitter:image"       content="https://www.preventionlab.pt/assets/img/og-image.jpg">

    <link rel="stylesheet" href="assets/css/base.css">
    <link rel="stylesheet" href="assets/css/layout.css">
    <link rel="stylesheet" href="assets/css/components.css">
    <link rel="stylesheet" href="assets/css/logo.css">
</head>
<body>

<canvas id="bg-canvas"></canvas>

<div class="page">

    <div class="pl-logo">
        <div class="pl-logo__mark" aria-hidden="true">
            <span class="pl-logo__o pl-logo__o--left">O</span>
            <span class="pl-logo__o pl-logo__o--right">O</span>
        </div>
        <div class="pl-logo__wordmark" role="img" aria-label="Prevention Lab">
            <span class="pl-logo__name" aria-hidden="true">Preventi<span class="pl-logo__name-o"><span class="pl-logo__name-o--l">o</span><span class="pl-logo__name-o--r">o</span></span>n</span>
            <span class="pl-logo__lab" aria-hidden="true">Lab</span>
        </div>
        <p class="pl-logo__tagline">Dra. Cristina Ferreira Leite</p>
    </div>

    <div class="divider" id="divider"></div>

    <div class="contact">
        <a href="tel:+351912198818">
            <i data-lucide="phone" width="17" height="17"></i>
            +351 912 198 818
        </a>
        <a href="mailto:info@preventionlab.pt">
            <i data-lucide="mail" width="17" height="17"></i>
            info@preventionlab.pt
        </a>
    </div>

    <div class="cta-wrap">
        <button class="btn-cta" id="open-modal">Saber Mais</button>
    </div>

    <div class="socials">
        <a href="https://www.instagram.com/dracristinaleite_prevlab/" target="_blank" rel="noopener" aria-label="Instagram">
            <span class="social-icon" style="mask-image: url('assets/icons/instagram.svg')"></span>
        </a>
        <a href="https://www.facebook.com/Prevention.Lab.Porto/" target="_blank" rel="noopener" aria-label="Facebook">
            <span class="social-icon" style="mask-image: url('assets/icons/facebook.svg')"></span>
        </a>
        <a href="https://www.linkedin.com/company/prevention-lab-porto/" target="_blank" rel="noopener" aria-label="LinkedIn">
            <span class="social-icon" style="mask-image: url('assets/icons/linkedin.svg')"></span>
        </a>
    </div>

    <div class="footer">&copy; 2026 PreventionLab. Todos os direitos reservados.</div>

</div>

<!-- Modal -->
<dialog id="contact-dialog" aria-labelledby="modal-title">
    <div class="dialog__inner">
        <button class="modal-close" id="close-modal" aria-label="Fechar">
            <i data-lucide="x" width="20" height="20"></i>
        </button>
        <h2 id="modal-title">Fique a par</h2>
        <p>Deixe os seus dados e entraremos em contacto assim que estivermos disponíveis.</p>
        <form id="contact-form" novalidate>
            <div class="form-group">
                <label for="name">Nome</label>
                <input type="text" id="name" name="name" placeholder="O seu nome" required>
            </div>
            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" placeholder="o.seu@email.com" required>
            </div>
            <div class="form-group">
                <label for="phone">Telefone (opcional)</label>
                <input type="tel" id="phone" name="phone" placeholder="+351 900 000 000">
            </div>
            <div class="form-group">
                <label for="interest">Interesse</label>
                <select id="interest" name="interest">
                    <option value="">Selecione uma área...</option>
                    <option value="stress">Gestão de Stress</option>
                    <option value="sleep">Qualidade do Sono</option>
                    <option value="longevity">Longevidade</option>
                    <option value="corporate">Programa Corporativo</option>
                    <option value="other">Outro</option>
                </select>
            </div>
            <div class="form-group">
                <label for="message">Mensagem (opcional)</label>
                <textarea id="message" name="message" placeholder="Em que podemos ajudar?"></textarea>
            </div>
            <button type="submit" class="btn-submit">Enviar</button>
        </form>
    </div>
</dialog>

<script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/lucide@0.344.0/dist/umd/lucide.min.js"></script>
<script type="module" src="assets/js/main.js"></script>
</body>
</html>
