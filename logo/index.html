<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PreventionLab — Logo Dev</title>
    <link rel="stylesheet" href="logo.css">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            min-height: 100vh;
            display: grid;
            place-items: center;
            gap: 4rem;
            padding: 4rem 2rem;
            /* Brand yellow from the identity */
            background: #d4f000;
        }

        /* Preview at different sizes */
        .preview { display: flex; flex-direction: column; align-items: center; gap: 4rem; }

        .size-label {
            font-family: monospace;
            font-size: 11px;
            opacity: .4;
            margin-top: .5rem;
            text-align: center;
        }
    </style>
</head>
<body>

<div class="preview">

    <div>
        <div class="pl-logo">
            <div class="pl-logo__mark" aria-hidden="true">
                <span class="pl-logo__o pl-logo__o--left">O</span>
                <span class="pl-logo__o pl-logo__o--right">O</span>
            </div>
            <div class="pl-logo__wordmark">
                <span class="pl-logo__name">Preventi<span class="pl-logo__name-o"><span class="pl-logo__name-o--l">o</span><span class="pl-logo__name-o--r">o</span></span>n</span>
                <span class="pl-logo__lab">Lab</span>
            </div>
            <p class="pl-logo__tagline">Dra. Cristina Ferreira Leite</p>
        </div>
        <p class="size-label">default (clamp)</p>
    </div>

    <!-- Small variant -->
    <div style="font-size: 0.5rem;">
        <div class="pl-logo">
            <div class="pl-logo__mark" aria-hidden="true">
                <span class="pl-logo__o pl-logo__o--left">O</span>
                <span class="pl-logo__o pl-logo__o--right">O</span>
            </div>
            <div class="pl-logo__wordmark">
                <span class="pl-logo__name">Preventi<span class="pl-logo__name-o"><span class="pl-logo__name-o--l">o</span><span class="pl-logo__name-o--r">o</span></span>n</span>
                <span class="pl-logo__lab">Lab</span>
            </div>
            <p class="pl-logo__tagline">Dra. Cristina Ferreira Leite</p>
        </div>
        <p class="size-label">small (0.5rem root)</p>
    </div>

</div>

</body>
</html>
